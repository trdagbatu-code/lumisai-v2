kind = "mobile"
previewPath = "/"
title = "LumisAI"
version = "1.0.0"
id = "artifacts/lumisai"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 23379

[services.development]
run = "pnpm --filter @workspace/lumisai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lumisai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lumisai", "run", "serve" ]

[services.env]
PORT = "23379"
BASE_PATH = "/"
